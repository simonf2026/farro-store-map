<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Farro Store Catchment Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    :root {
      --farro-dark: #123f45;
      --farro-mid: #1f5a60;
      --panel: #ffffff;
      --page: #eef2f2;
      --text: #1f2933;
      --muted: #617078;
      --border: #d8e0e1;
      --error: #9b1c1c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--page);
      color: var(--text);
    }

    body {
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100%;
    }

    .header {
      min-height: 76px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: var(--farro-dark);
      color: white;
    }

    .header-title {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    .header-subtitle {
      margin-top: 4px;
      font-size: 14px;
      opacity: 0.85;
    }

    .brand {
      font-size: 24px;
      letter-spacing: 4px;
      font-weight: 600;
      white-space: nowrap;
    }

    .toolbar {
      min-height: 52px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }

    button {
      min-height: 36px;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #f5f7f7;
    }

    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
    }

    .status.error {
      color: var(--error);
      font-weight: 600;
    }

    .content {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 450px;
      background: #dbe8ea;
    }

    #map img {
      max-width: none !important;
      max-height: none !important;
    }

    .sidebar {
      overflow-y: auto;
      padding: 18px;
      background: var(--panel);
      border-left: 1px solid var(--border);
    }

    .sidebar h2 {
      margin: 0 0 4px;
      font-size: 18px;
    }

    .sidebar-intro {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .location-list {
      display: grid;
      gap: 8px;
    }

    .location-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 9px;
      padding: 9px 8px;
      border: 1px solid transparent;
      border-radius: 7px;
    }

    .location-row:hover {
      background: #f5f7f7;
      border-color: var(--border);
    }

    .location-row button {
      padding: 0;
      min-height: 0;
      border: 0;
      background: transparent;
      text-align: left;
      font-weight: 600;
    }

    .location-row button:hover {
      background: transparent;
      text-decoration: underline;
    }

    .colour-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.15);
    }

    .toggle {
      width: 17px;
      height: 17px;
      cursor: pointer;
    }

    .location-address {
      grid-column: 2 / 4;
      margin-top: -4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .map-label {
      padding: 2px 5px;
      border: 0;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: none;
      color: #1b262b;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .map-label::before {
      display: none;
    }

    .popup-title {
      margin-bottom: 5px;
      font-size: 15px;
      font-weight: 700;
    }

    .popup-detail {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .loading-panel {
      position: absolute;
      z-index: 1000;
      top: 140px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.96);
      font-size: 14px;
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100%;
      }

      .content {
        grid-template-columns: 1fr;
        grid-template-rows: 65vh auto;
      }

      .sidebar {
        border-left: 0;
        border-top: 1px solid var(--border);
      }

      .brand {
        display: none;
      }

      .status {
        width: 100%;
        margin-left: 0;
      }
    }

    @media print {
      .toolbar,
      .sidebar {
        display: none;
      }

      .app {
        display: block;
      }

      #map {
        height: 95vh;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="header">
      <div>
        <h1 class="header-title">Farro Store Catchment Map</h1>
        <div class="header-subtitle">10 km radius from each location</div>
      </div>
      <div class="brand" aria-label="Farro">FARRO</div>
    </header>

    <div class="toolbar">
      <button id="fitMap" type="button">Fit all locations</button>
      <button id="showAll" type="button">Show all</button>
      <button id="hideAll" type="button">Hide all</button>
      <button id="printMap" type="button">Print map</button>
      <div id="status" class="status" role="status" aria-live="polite">Loading map.kml…</div>
    </div>

    <div class="content">
      <main id="map" aria-label="Interactive Farro store catchment map"></main>

      <aside class="sidebar">
        <h2>Locations</h2>
        <p class="sidebar-intro">
          Select a location to zoom to it. Use the checkboxes to show or hide individual catchments.
        </p>
        <div id="locationList" class="location-list"></div>
      </aside>
    </div>
  </div>

  <div id="loadingPanel" class="loading-panel">Loading the catchment map…</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js"></script>

  <script>
    const KML_FILE = "map.kml";

    const LOCATIONS = [
      {
        id: "MB",
        pointName: "Mairangi Bay",
        polygonName: "MB Catchment",
        displayName: "Mairangi Bay",
        address: "70 Constellation Drive, Mairangi Bay",
        colour: "#e53935"
      },
      {
        id: "GL",
        pointName: "Grey Lynn",
        polygonName: "GL Catchment",
        displayName: "Grey Lynn",
        address: "34 Westmoreland Street West, Grey Lynn",
        colour: "#8e24aa"
      },
      {
        id: "SF",
        pointName: "Smales Farm",
        polygonName: "SF Catchment",
        displayName: "Smales Farm",
        address: "78 Taharoto Road, Takapuna",
        colour: "#1e88e5"
      },
      {
        id: "ME",
        pointName: "Mt Eden",
        polygonName: "ME Catchment",
        displayName: "Mt Eden",
        address: "422 Dominion Road, Mount Eden",
        colour: "#43a047"
      },
      {
        id: "EP",
        pointName: "Epsom",
        polygonName: "EP Catchment",
        displayName: "Epsom",
        address: "446 Manukau Road, Epsom",
        colour: "#f9a825"
      },
      {
        id: "MW",
        pointName: "Mt Wellington",
        polygonName: "MW Catchment",
        displayName: "Mt Wellington",
        address: "80 Lunn Avenue, Mt Wellington",
        colour: "#1565c0"
      },
      {
        id: "OR",
        pointName: "Orakei (Kepa)",
        polygonName: "OR Catchment",
        displayName: "Orakei",
        address: "176 Kepa Road, Orakei",
        colour: "#ef6c00"
      },
      {
        id: "NM",
        pointName: "Newmarket",
        polygonName: "NM Catchment",
        displayName: "Newmarket",
        address: "480 Broadway, Newmarket",
        colour: "#00897b"
      }
    ];

    const map = L.map("map", {
      zoomControl: true,
      preferCanvas: true
    }).setView([-36.85, 174.76], 10);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    L.control.scale({
      metric: true,
      imperial: false,
      position: "bottomleft"
    }).addTo(map);

    const statusElement = document.getElementById("status");
    const loadingPanel = document.getElementById("loadingPanel");
    const locationList = document.getElementById("locationList");

    const locationLayers = new Map();
    let allBounds = null;

    function setStatus(message, isError = false) {
      statusElement.textContent = message;
      statusElement.classList.toggle("error", isError);
    }

    function locationForFeature(feature) {
      const name = String(feature?.properties?.name || "").trim();

      return LOCATIONS.find(location =>
        location.pointName === name || location.polygonName === name
      );
    }

    function cleanDescription(description) {
      if (!description) {
        return "10 km catchment area";
      }

      const temporary = document.createElement("div");
      temporary.innerHTML = String(description);
      return temporary.textContent || temporary.innerText || "10 km catchment area";
    }

    function popupHtml(location, feature) {
      const description = cleanDescription(feature?.properties?.description);

      return `
        <div class="popup-title">${location.displayName}</div>
        <div class="popup-detail">${location.address}</div>
        <div class="popup-detail">${description}</div>
      `;
    }

    function initialiseLayerGroup(location) {
      if (!locationLayers.has(location.id)) {
        locationLayers.set(location.id, {
          location,
          group: L.featureGroup(),
          point: null,
          polygon: null
        });
      }

      return locationLayers.get(location.id);
    }

    function addFeature(feature) {
      const location = locationForFeature(feature);

      if (!location) {
        return;
      }

      const collection = initialiseLayerGroup(location);
      const geometryType = feature?.geometry?.type;

      const layer = L.geoJSON(feature, {
        style: function () {
          return {
            color: location.colour,
            weight: 3,
            opacity: 0.95,
            fillColor: location.colour,
            fillOpacity: 0.16
          };
        },
        pointToLayer: function (_feature, latlng) {
          return L.circleMarker(latlng, {
            radius: 7,
            color: "#ffffff",
            weight: 2,
            fillColor: location.colour,
            fillOpacity: 1
          });
        }
      });

      layer.eachLayer(item => {
        item.bindPopup(popupHtml(location, feature));

        if (geometryType === "Point") {
          item.bindTooltip(location.displayName, {
            permanent: true,
            direction: "bottom",
            offset: [0, 10],
            className: "map-label"
          });
          collection.point = item;
        } else {
          collection.polygon = item;
        }

        collection.group.addLayer(item);
      });
    }

    function buildLegend() {
      locationList.innerHTML = "";

      LOCATIONS.forEach(location => {
        const collection = locationLayers.get(location.id);

        if (!collection) {
          return;
        }

        const row = document.createElement("div");
        row.className = "location-row";

        const dot = document.createElement("span");
        dot.className = "colour-dot";
        dot.style.backgroundColor = location.colour;

        const zoomButton = document.createElement("button");
        zoomButton.type = "button";
        zoomButton.textContent = location.displayName;
        zoomButton.addEventListener("click", () => {
          const bounds = collection.group.getBounds();

          if (bounds.isValid()) {
            map.fitBounds(bounds, {
              padding: [24, 24],
              maxZoom: 12
            });
          }
        });

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "toggle";
        checkbox.checked = true;
        checkbox.setAttribute("aria-label", `Show ${location.displayName}`);
        checkbox.addEventListener("change", () => {
          if (checkbox.checked) {
            collection.group.addTo(map);
          } else {
            map.removeLayer(collection.group);
          }
        });

        const address = document.createElement("div");
        address.className = "location-address";
        address.textContent = location.address;

        row.append(dot, zoomButton, checkbox, address);
        locationList.appendChild(row);

        collection.checkbox = checkbox;
      });
    }

    function fitAllLocations() {
      if (allBounds && allBounds.isValid()) {
        map.fitBounds(allBounds, {
          padding: [25, 25],
          maxZoom: 11
        });
      }
    }

    function setAllVisibility(visible) {
      locationLayers.forEach(collection => {
        if (visible) {
          collection.group.addTo(map);
        } else {
          map.removeLayer(collection.group);
        }

        if (collection.checkbox) {
          collection.checkbox.checked = visible;
        }
      });
    }

    async function loadMap() {
      try {
        const response = await fetch(KML_FILE, {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(`Unable to load ${KML_FILE} (${response.status})`);
        }

        const kmlText = await response.text();
        const xml = new DOMParser().parseFromString(kmlText, "text/xml");

        if (xml.querySelector("parsererror")) {
          throw new Error("The KML file is not valid XML.");
        }

        const geojson = toGeoJSON.kml(xml);

        if (!geojson.features || geojson.features.length === 0) {
          throw new Error("No features were found in the KML file.");
        }

        geojson.features.forEach(addFeature);

        locationLayers.forEach(collection => {
          collection.group.addTo(map);
        });

        const combined = L.featureGroup(
          Array.from(locationLayers.values()).map(collection => collection.group)
        );

        allBounds = combined.getBounds();

        buildLegend();
        fitAllLocations();

        loadingPanel.remove();
        setStatus(`${locationLayers.size} locations loaded from ${KML_FILE}`);
      } catch (error) {
        console.error(error);
        loadingPanel.textContent = "The map could not be loaded.";
        setStatus(error.message, true);
      }
    }

    document.getElementById("fitMap").addEventListener("click", fitAllLocations);
    document.getElementById("showAll").addEventListener("click", () => setAllVisibility(true));
    document.getElementById("hideAll").addEventListener("click", () => setAllVisibility(false));
    document.getElementById("printMap").addEventListener("click", () => window.print());

    loadMap();
  </script>
</body>
</html>
